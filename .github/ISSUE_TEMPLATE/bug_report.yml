name: Bug Report
description: Report a bug in OpenUsage
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Open OpenUsage
        2. Go to ...
        3. Click on ...
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: OpenUsage Version
      description: Which version are you running?
      placeholder: "e.g. 0.7.0"
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS Version
      description: OpenUsage requires macOS 15 (Sequoia) or later.
      placeholder: "e.g. 15.5"
    validations:
      required: true
  - type: dropdown
    id: chip
    attributes:
      label: Mac Type
      options:
        - Apple Silicon
        - Intel
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, drag and drop or paste screenshots here.
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other information that might be helpful.
