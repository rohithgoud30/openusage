name: CI

on:
  # The Swift edition ships from `swift`; `main` is the Tauri edition with its own workflows, so the
  # Swift CI only triggers on `swift` pushes. PRs targeting either branch run it (swift -> main is the
  # eventual cutover).
  push:
    branches: [swift]
  pull_request:
    branches: [main, swift]

permissions:
  contents: read

jobs:
  check:
    name: Build and Test
    # Builds against the macOS 26 SDK with the package's macOS 15 deployment target (Package.swift
    # .macOS(.v15)), so this compiles the whole codebase — including the `if #available(macOS 26, *)`
    # Liquid Glass branches — for the macOS 15 floor. That is the floor's compile guarantee: a binary
    # built here reports minos 15.0. We do NOT add a macos-15 runner leg — back-deployment compiles
    # against the newest SDK, and a stock macos-15 runner ships Swift 6.1 without the macOS 26 SDK, so
    # it cannot build this package. Runtime verification on Sequoia is a manual smoke pass.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Build
        run: swift build

      - name: Run tests
        run: swift test
